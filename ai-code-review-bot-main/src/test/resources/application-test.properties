# Test profile - uses H2 in-memory database, no real API keys needed
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Dummy values for tests
claude.api.key=test-key
claude.api.url=https://api.anthropic.com/v1/messages
claude.api.model=claude-sonnet-4-20250514
claude.api.max-tokens=1000

github.token=test-token
github.api.url=https://api.github.com
github.webhook.secret=test-secret
